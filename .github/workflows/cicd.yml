name: CI-CD FLASK Docker

on:
  push:
    branches: [main]

jobs:
    cd:
        name: docker build & deploy
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v3
        - name: set up Docker 
          uses: docker/setup-buildx-action@v2

        - name: Login to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Build and Push Docker image
          run: |
            docker build -t Jihane/flask_devops_demo:latest .
            docker push Jihane/flask_devops_demo:latest
        - name: Deploy via SSH
          run : |
             echo "${{secrets.SSH_KEY}}" > key.pem
             chmod 600 key.pem
             ssh -i key.pem -o StrictHostKeyChecking=no "${{secrets.SSH_USER}}@${{secrets.SSH_HOST}}" \
             "powershell -ExecutionPolicy Bypass -File
             'C:\\Users\\pro\\flask_app\\deploy.ps1' -DockerUser ${{ secrets.DOCKERHUB_USERNAME }}
             -DockerToken ${{ secrets.DOCKERHUB_TOKEN }}"